<!DOCTYPE html>
<html>
<head>
    
    <title>Form Submitted</title>
    <style>
        body {
            background-color: #f4f6f8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }

        .confirmation-box {
            background-color: #fff;
            padding: 40px 60px;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            color: #000000;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        a.button {
            display: inline-block;
            padding: 12px 25px;
            background-color: #050606;
            color: #fff;
            font-weight: bold;
            border-radius: 8px;
            text-decoration: none;
            transition: background-color 0.3s ease;
        }

        a.button:hover {
            background-color: #4d4d4d;
        }
    </style>
</head>
<body>
    <div class="confirmation-box">
        <h1>Form Sent Successfully!</h1>
        <p>Thank you! Your incident report has been submitted and emailed successfully.</p>
        <a class="button" href="/">New Form</a>
    </div>
</body>
</html>
